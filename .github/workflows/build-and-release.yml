name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      # 'true' when this push/PR touches library source — gates the RC publish below
      # so docs-only / test-only changes don't cut a new NuGet prerelease.
      src: ${{ steps.filter.outputs.src }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          src:
            - 'src/**'

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Important for versioning
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
    
    - name: Pack
      run: |
        # Determine version
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION=$(date +%Y.%m.%d)-rc.$GITHUB_RUN_NUMBER
        fi
        
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Packing version $VERSION"

        # Andy.Tools.Data depends (via a project reference) on Andy.Tools at the same version, so
        # both packages are packed and published together. PackageVersion is a global property, so
        # the project-reference dependency in Andy.Tools.Data resolves to the same $VERSION.
        for proj in \
          src/Andy.Tools/Andy.Tools.csproj \
          src/Andy.Tools.Data/Andy.Tools.Data.csproj; do
          dotnet pack "$proj" \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            -p:PackageVersion=$VERSION
        done

        # Andy.Tools.Pdf ships at its own fixed RC (its csproj <Version>), independent of the
        # date-based Andy.Tools/Data line above: it has a hard PackageReference on Andy.Doc.Pdf at a
        # pinned version that must stay matched, and its Andy.Tools dependency floats (>= 1.0.0), so it
        # does not force consumers to bump their Andy.Tools pin. No -p:PackageVersion override here.
        dotnet pack src/Andy.Tools.Pdf/Andy.Tools.Pdf.csproj \
          --configuration Release \
          --no-build \
          --output ./artifacts
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg
        retention-days: 7

  publish-prerelease:
    needs: [build, changes]
    runs-on: ubuntu-latest
    # Only publish a dated RC when pushing to main AND library source changed.
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.src == 'true'
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Publish to NuGet
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source ${{ env.NUGET_SOURCE }} \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --skip-duplicate

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Publish to NuGet
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source ${{ env.NUGET_SOURCE }} \
          --api-key ${{ secrets.NUGET_API_KEY }}
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/*.nupkg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}